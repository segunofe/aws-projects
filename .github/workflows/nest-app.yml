# ============================================================
# GitHub Actions CI/CD Pipeline: Deploy Nest App to AWS ECS
# ============================================================
# This workflow automates:
#   1. Provisioning AWS infrastructure with Terraform
#   2. Building, scanning, and pushing a Docker image to ECR
#   3. Creating a new ECS task definition revision
#   4. Restarting the ECS Fargate service
#   5. Testing application health
#   6. Monitoring the deployment
#   7. Rolling back on failure
#   8. Sending Slack notifications
# ============================================================

name: Deploy Nest App to AWS ECS

# --------------------------------------------------------------
# TRIGGER: When should this workflow run?
# --------------------------------------------------------------
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nest-app.yml"
      - "docker/nest-app/**"
      - "terraform-module/nest-app/**"

# --------------------------------------------------------------
# ENVIRONMENT VARIABLES: Shared across all jobs. Global variables
# --------------------------------------------------------------
# The key for the next section is env
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "851725625129"
  TERRAFORM_ACTION: apply
  PROJECT_NAME: nest
  ENVIRONMENT: dev
  RECORD_NAME: www
  DOMAIN_NAME: cloudsdew.com
  GITHUB_USERNAME: segunofe
  REPOSITORY_NAME: nest-app-code # the name of repo wher the application code is located
  SERVICE_PROVIDER_FILE_NAME: AppServiceProvider # the name of the main service provider file without extension
  APPLICATION_CODE_FILE_NAME: nest # the name of the main application code file without extension
  RDS_DB_NAME: applicationdb
  RDS_DB_USERNAME: admin
  IMAGE_NAME: nest
  IMAGE_TAG: latest

# The key for the next section is job
jobs:
  #--------------------------------------------------------------
  # JOB 1: Build AWS Infrastructure
  #--------------------------------------------------------------
  deploy_aws_infrastructure: # think of this line like the reference name in terraform. You make it up yourself.
    name: Build AWS infrastructure
    runs-on: ubuntu-latest # the type of virtual machine (runner) to use for this job. Github provided runner not self-hosted. You can also use windows-latest or macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH access for Terraform modules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Run Terraform init
        working-directory: ./terraform-module/nest-app
        run: terraform init

      - name: Run Terraform plan
        working-directory: ./terraform-module/nest-app
        run: terraform plan -no-color # The -no-color flag is used to remove ANSI color codes from the output, making it cleaner and easier to read in CI/CD logs.

      - name: Run Terraform apply/destroy
        working-directory: ./terraform-module/nest-app
        run: terraform ${TERRAFORM_ACTION} -auto-approve

      # The outputs we specified in Terraform will want to export them out of Terraform and add them to our pipeline for use in other jobs.
      - name: Export Terraform outputs
        if: env.TERRAFORM_ACTION == 'apply' # this step should only run if the Terraform action is apply.
        working-directory: ./terraform-module/nest-app
        run: |
          # echo "DOMAIN_NAME=$(terraform output -raw domain_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_TASK_DEFINITION_NAME=$(terraform output -raw ecs_task_definition_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_CLUSTER_NAME=$(terraform output -raw ecs_cluster_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_SERVICE_NAME=$(terraform output -raw ecs_service_name | cut -d ':' -f1)" >> $GITHUB_ENV

    outputs:
      terraform_action: ${{ env.TERRAFORM_ACTION }}
      domain_name: ${{ env.DOMAIN_NAME }}
      rds_endpoint: ${{ env.RDS_ENDPOINT }}
      task_definition_name: ${{ env.ECS_TASK_DEFINITION_NAME }}
      ecs_cluster_name: ${{ env.ECS_CLUSTER_NAME }}
      ecs_service_name: ${{ env.ECS_SERVICE_NAME }}

  #--------------------------------------------------------------
  # JOB 2: Build, Scan, and Push Docker Image to ECR
  # This job builds the Docker image for the Nest app, scans it for vulnerabilities using Trivy, and pushes it to Amazon ECR.
  # Counts the number of critical and high vulnerabilities found in the scan and
  # Outputs a summary that can be included in the Slack notification later.
  # The scan test may be used for security assessment report for auditors
  #--------------------------------------------------------------
  build_and_push_image:
    name: Build, scan, and push Docker image to ECR
    needs: deploy_aws_infrastructure
    if: needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy' # this job should only run if the Terraform action is not destroy.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ./docker/nest-app
        env:
          DOMAIN_NAME: ${{ needs.deploy_aws_infrastructure.outputs.domain_name }}
          RDS_ENDPOINT: ${{ needs.deploy_aws_infrastructure.outputs.rds_endpoint }}
          RDS_DB_PASSWORD: ${{ secrets.RDS_DB_PASSWORD }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: bash ./build-image.sh

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master # We will use a Trivy GitHub Action to scan our Docker image for vulnerabilities. Replace <TRIVY_SCAN_ACTION> with the actual action name, e.g., aquasecurity/trivy-action@v0.0.1.
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: ${{ env.ENVIRONMENT == 'prod' && '1' || '0' }} # Fail the build if vulnerabilities are found in production, but allow it in non-production environments.
          format: json
          output: trivy-report.json

      - name: Generate vulnerability summary # This step processes the Trivy JSON report to count the number of critical and high vulnerabilities, and then sets a summary message in the GitHub Actions environment variable SCAN_SUMMARY. The summary will indicate whether any vulnerabilities were found and their severity.
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json)
          TOTAL=$((CRITICAL + HIGH))

          if [ "$TOTAL" -eq 0 ]; then
            SUMMARY="✅ No vulnerabilities found"
          else
            SUMMARY="⚠️ ${TOTAL} vulnerabilities found (${CRITICAL} Critical, ${HIGH} High)"
          fi

          echo "SCAN_SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "$SUMMARY"

      - name: Push Docker image to ECR
        working-directory: ./docker/nest-app
        run: bash ./push-image.sh

    outputs:
      scan_summary: ${{ env.SCAN_SUMMARY }}

  #--------------------------------------------------------------
  # JOB 3: Create New Task Definition Revision
  # This job creates a new revision of the ECS task definition with the updated (latest) Docker image.
  # And outputs the new revision number as well as the current revision number before the update, which can be used for rollback if needed.
  # Think of "current revision" as the revision that is currently running in production before the deployment
  # The "new revision" as the revision that we just created with the updated image and will be deployed to production.
  #--------------------------------------------------------------
  create_task_definition_revision:
    name: Create new task definition revision
    needs:
      - deploy_aws_infrastructure
      - build_and_push_image
    if: needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy' # this job should only run if the Terraform action is not destroy.
    runs-on: ubuntu-latest
    steps:
      - name: Get current task definition revision
        env:
          ECS_FAMILY: ${{ needs.deploy_aws_infrastructure.outputs.task_definition_name }}
        run: |
          CURRENT_REVISION=$(aws ecs describe-task-definition --task-definition "${ECS_FAMILY}" \
            --query 'taskDefinition.revision' --output text)
          echo "CURRENT_TASK_DEFINITION_REVISION=$CURRENT_REVISION" >> $GITHUB_ENV

      - name: Create new task definition revision
        env:
          ECS_FAMILY: ${{ needs.deploy_aws_infrastructure.outputs.task_definition_name }}
          ECS_IMAGE: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        run: |
          TASK_DEFINITION=$(aws ecs describe-task-definition --task-definition "${ECS_FAMILY}")

          NEW_TASK_DEFINITION=$(echo "$TASK_DEFINITION" | jq --arg IMAGE "${ECS_IMAGE}" \
            '.taskDefinition | .containerDefinitions[0].image = $IMAGE |
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEFINITION_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEFINITION" | jq '.taskDefinition.revision')

          echo "NEW_TASK_DEFINITION_REVISION=$NEW_TASK_DEFINITION_REVISION" >> $GITHUB_ENV

    outputs:
      new_task_definition_revision: ${{ env.NEW_TASK_DEFINITION_REVISION }}
      current_task_definition_revision: ${{ env.CURRENT_TASK_DEFINITION_REVISION }}

  #--------------------------------------------------------------
  # JOB 4: Restart ECS Fargate Service
  # Since a new task definition revision is created,
  # we need to restart the ECS service to pick up the new revision and deploy the updated application.
  #--------------------------------------------------------------
  restart_ecs_service:
    name: Restart ECS Fargate service
    needs:
      - deploy_aws_infrastructure
      - create_task_definition_revision
    if: needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy' # this job should only run if the Terraform action is not destroy.
    runs-on: ubuntu-latest
    steps:
      - name: Restart ECS service
        env:
          ECS_CLUSTER_NAME: ${{ needs.deploy_aws_infrastructure.outputs.ecs_cluster_name }}
          ECS_SERVICE_NAME: ${{ needs.deploy_aws_infrastructure.outputs.ecs_service_name }}
          TASK_DEFINITION_NAME: ${{ needs.deploy_aws_infrastructure.outputs.task_definition_name }}
          TASK_DEFINITION_REVISION: ${{ needs.create_task_definition_revision.outputs.new_task_definition_revision }}
        run: |
          aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_NAME}" \
            --task-definition "${TASK_DEFINITION_NAME}:${TASK_DEFINITION_REVISION}" --force-new-deployment

          aws ecs wait services-stable --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_SERVICE_NAME}"

  #--------------------------------------------------------------
  # JOB 5: Test Application Health
  # This job wait for the service to stablize
  # And check the health of the application by sending a request to the domain and verifying the response status code is 200.
  #--------------------------------------------------------------
  test_application:
    name: Test application health
    needs:
      - deploy_aws_infrastructure
      - restart_ecs_service
    if: needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy' # this job should only run if the Terraform action is not destroy.
    runs-on: ubuntu-latest
    steps:
      - name: Wait for service to stabilize
        run: sleep 30 # wait 30 seconds for the service to stabilize before health check

      - name: Check application health
        env:
          DOMAIN_NAME: ${{ needs.deploy_aws_infrastructure.outputs.domain_name }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://www.${DOMAIN_NAME}")
          echo "HTTP Status: $RESPONSE"

          if [ "$RESPONSE" -eq 200 ]; then
            echo "Application is healthy"
          else
            echo "Application health check failed"
            exit 1
          fi

  #--------------------------------------------------------------
  # JOB 6: Monitor ECS Deployment #
  # Check if running and desired task counts are the same or not.
  # If they are not the same, it indicates that some tasks failed to start and the deployment may have issues.
  #--------------------------------------------------------------
  monitor_deployment:
    name: Monitor ECS deployment
    needs:
      - deploy_aws_infrastructure
      - restart_ecs_service
    if: needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy' # this job should only run if the Terraform action is not destroy.
    runs-on: ubuntu-latest
    steps:
      - name: Check ECS running tasks
        env:
          ECS_CLUSTER_NAME: ${{ needs.deploy_aws_infrastructure.outputs.ecs_cluster_name }}
          ECS_SERVICE_NAME: ${{ needs.deploy_aws_infrastructure.outputs.ecs_service_name }}
        run: |
          RUNNING_COUNT=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_SERVICE_NAME}" \
            --query "services[0].runningCount" \     
            --output text)

          DESIRED_COUNT=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_SERVICE_NAME}" \
            --query "services[0].desiredCount" \     
            --output text)

          echo "Running tasks: $RUNNING_COUNT / Desired tasks: $DESIRED_COUNT"

          if [ "$RUNNING_COUNT" -eq "$DESIRED_COUNT" ]; then
            echo "All tasks are running successfully"
          else
            echo "Task count mismatch - deployment may have issues"
            exit 1
          fi

  #--------------------------------------------------------------
  # JOB 7: Rollback on Failure #
  # If any of jobs 5 or 6 fail, this job (7) will revert back to the previous revison of the task definition in job 4 that was working.
  #--------------------------------------------------------------
  rollback:
    name: Rollback to previous version
    needs:
      - deploy_aws_infrastructure
      - create_task_definition_revision
      - restart_ecs_service
      - test_application
      - monitor_deployment
    if: failure() && needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy' # this job should only run if the Terraform action is not destroy.
    runs-on: ubuntu-latest
    steps:
      - name: Rollback ECS service to previous task definition
        env:
          ECS_CLUSTER_NAME: ${{ needs.deploy_aws_infrastructure.outputs.ecs_cluster_name }}
          ECS_SERVICE_NAME: ${{ needs.deploy_aws_infrastructure.outputs.ecs_service_name }}
          TASK_DEFINITION_NAME: ${{ needs.deploy_aws_infrastructure.outputs.task_definition_name }}
          PREVIOUS_REVISION: ${{ needs.create_task_definition_revision.outputs.current_task_definition_revision }}
        run: |
          echo "Rolling back to task definition revision: $PREVIOUS_REVISION"

          aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_NAME}" \
            --task-definition "${TASK_DEFINITION_NAME}:${PREVIOUS_REVISION}" --force-new-deployment

          aws ecs wait services-stable --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_SERVICE_NAME}"

          echo "Rollback complete"

  #--------------------------------------------------------------
  # JOB 8: Send Notification about Deployment Result # success or failure
  #--------------------------------------------------------------
  notify:
    name: Send notification
    needs:
      - deploy_aws_infrastructure
      - build_and_push_image
      - create_task_definition_revision
      - restart_ecs_service
      - test_application
      - monitor_deployment
    if: always() && needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy' # this job should run regardless of success or failure of previous jobs, but should be skipped if the Terraform action is destroy.
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ needs.test_application.result == 'success' && needs.monitor_deployment.result == 'success' && '✅ Deployment Successful' || '❌ Deployment Failed' }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ needs.test_application.result == 'success' && needs.monitor_deployment.result == 'success' && '✅ Deployment Successful' || '❌ Deployment Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Project:*\n${{ env.PROJECT_NAME }}" },
                    { "type": "mrkdwn", "text": "*Environment:*\n${{ env.ENVIRONMENT }}" },
                    { "type": "mrkdwn", "text": "*Image:*\n${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Security Scan:*\n${{ needs.build_and_push_image.outputs.scan_summary || 'Scan not available' }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pipeline:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
