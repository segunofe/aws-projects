# ============================================================
# GitHub Actions CI/CD Pipeline: Deploy Nest App to AWS ECS
# ============================================================
# This workflow automates:
#   1. Provisioning AWS infrastructure with Terraform
#   2. Building, scanning, and pushing a Docker image to ECR
#   3. Creating a new ECS task definition revision
#   4. Restarting the ECS Fargate service
#   5. Testing application health
#   6. Monitoring the deployment
#   7. Rolling back on failure
#   8. Sending Slack notifications
# ============================================================

name: Deploy Nest App to AWS ECS

# --------------------------------------------------------------
# TRIGGER: When should this workflow run?
# --------------------------------------------------------------
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nest-app.yml"
      - "docker/nest-app/**"
      - "terraform-module/nest-app/**"

# --------------------------------------------------------------
# ENVIRONMENT VARIABLES: Shared across all jobs. Global variables
# --------------------------------------------------------------
# The key for the next section is env
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "851725625129"
  TERRAFORM_ACTION: destroy
  PROJECT_NAME: nest
  ENVIRONMENT: dev
  # RECORD_NAME: www
  # DOMAIN_NAME: coudsdew.com
  GITHUB_USERNAME: segunofe
  REPOSITORY_NAME: nest-app-code # the name of repo wher the application code is located
  SERVICE_PROVIDER_FILE_NAME: AppServiceProvider # the name of the main service provider file without extension
  APPLICATION_CODE_FILE_NAME: nest # the name of the main application code file without extension
  RDS_DB_NAME: applicationdb
  RDS_DB_USERNAME: admin
  IMAGE_NAME: nest
  IMAGE_TAG: latest

# The key for the next section is job
jobs:
  #--------------------------------------------------------------
  # JOB 1: Build AWS Infrastructure
  #--------------------------------------------------------------
  deploy_aws_infrastructure: # think of this line like the reference name in terraform. You make it up yourself.
    name: Build AWS infrastructure
    runs-on: ubuntu-latest # the type of virtual machine (runner) to use for this job. Github provided runner not self-hosted. You can also use windows-latest or macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH access for Terraform modules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Run Terraform init
        working-directory: ./terraform-module/nest-app
        run: terraform init

      - name: Run Terraform plan
        working-directory: ./terraform-module/nest-app
        run: terraform plan -no-color # The -no-color flag is used to remove ANSI color codes from the output, making it cleaner and easier to read in CI/CD logs.

      - name: Run Terraform apply/destroy
        working-directory: ./terraform-module/nest-app
        run: terraform ${TERRAFORM_ACTION} -auto-approve

      # The outputs we specified in Terraform will want to export them out of Terraform and add them to our pipeline for use in other jobs.
      - name: Export Terraform outputs
        if: env.TERRAFORM_ACTION == 'apply' # this step should only run if the Terraform action is apply.
        working-directory: ./terraform-module/nest-app
        run: |
          # echo "DOMAIN_NAME=$(terraform output -raw domain_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_TASK_DEFINITION_NAME=$(terraform output -raw ecs_task_definition_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_CLUSTER_NAME=$(terraform output -raw ecs_cluster_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_SERVICE_NAME=$(terraform output -raw ecs_service_name | cut -d ':' -f1)" >> $GITHUB_ENV

    outputs:
      terraform_action: ${{ env.TERRAFORM_ACTION }}
      # domain_name: ${{ env.DOMAIN_NAME }}
      rds_endpoint: ${{ env.RDS_ENDPOINT }}
      task_definition_name: ${{ env.ECS_TASK_DEFINITION_NAME }}
      ecs_cluster_name: ${{ env.ECS_CLUSTER_NAME }}
      ecs_service_name: ${{ env.ECS_SERVICE_NAME }}
  #--------------------------------------------------------------
  # JOB 2: Build, Scan, and Push Docker Image to ECR
  #--------------------------------------------------------------
  build_and_push_image:
    name: Build, scan, and push Docker image to ECR
    needs: deploy_aws_infrastructure
    if: needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy' # this job should only run if the Terraform action is not destroy.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ./docker/nest-app
        env:
          # DOMAIN_NAME: ${{ needs.deploy_aws_infrastructure.outputs.domain_name }}
          RDS_ENDPOINT: ${{ needs.deploy_aws_infrastructure.outputs.rds_endpoint }}
          RDS_DB_PASSWORD: ${{ secrets.RDS_DB_PASSWORD }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: bash ./build-image.sh

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master # We will use a Trivy GitHub Action to scan our Docker image for vulnerabilities. Replace <TRIVY_SCAN_ACTION> with the actual action name, e.g., aquasecurity/trivy-action@v0.0.1.
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: ${{ env.ENVIRONMENT == 'prod' && '1' || '0' }} # Fail the build if vulnerabilities are found in production, but allow it in non-production environments.
          format: json
          output: trivy-report.json

      - name: Generate vulnerability summary # This step processes the Trivy JSON report to count the number of critical and high vulnerabilities, and then sets a summary message in the GitHub Actions environment variable SCAN_SUMMARY. The summary will indicate whether any vulnerabilities were found and their severity.
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json)
          TOTAL=$((CRITICAL + HIGH))

          if [ "$TOTAL" -eq 0 ]; then
            SUMMARY="✅ No vulnerabilities found"
          else
            SUMMARY="⚠️ ${TOTAL} vulnerabilities found (${CRITICAL} Critical, ${HIGH} High)"
          fi

          echo "SCAN_SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "$SUMMARY"

      - name: Push Docker image to ECR
        working-directory: ./docker/nest-app
        run: bash ./push-image.sh

    outputs:
      scan_summary: ${{ env.SCAN_SUMMARY }}
